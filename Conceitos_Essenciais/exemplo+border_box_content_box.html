<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diferença</title>
    <style>
        .Content-box {
            border: 30px solid black;
            box-sizing: content-box;
            width: 430px;
            height: 320px;
            padding: 20px;

        }

        .Border-box {
            border: 30px solid black;
            box-sizing: border-box;
            width: 430px;
            height: 320px;
            padding: 20px;
        }
    </style>
</head>

<body>
    <section>
        <h1>Diferença content-box vs border-box</h1>
        <div class="Content-box">
            <p>Sou uma content-box!</p>
        </div>

        <hr>

    </section>
    <section>
        <div class="Border-box">
            <p>Sou uma border-box!</p>
        </div>
    </section>
</body>

</html>
