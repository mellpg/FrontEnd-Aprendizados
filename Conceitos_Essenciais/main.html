<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Exemplo Main vs Section</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Estilizando o contêiner principal para destacar */
        main {
            border: 3px solid #333;
            padding: 20px;
            background-color: #f9f9f9;
        }

        /* Estilizando as seções */
        section {
            border: 2px dashed #007bff;
            padding: 15px;
            margin-top: 15px;
            background-color: #e3f2fd;
        }

        h1 {
            color: #333;
        }

        h2 {
            color: #007bff;
        }
    </style>
</head>

<body>

    <header>
        <p>Menu de Navegação (Repete em todas as páginas)</p>
    </header>

    <!-- O MAIN envolve o conteúdo único da página -->
    <main>
        <h1>Bem-vindo ao Meu Site</h1>
        <p>Este é o conteúdo principal e exclusivo desta página.</p>

        <!-- A SECTION divide partes do conteúdo principal -->
        <section>
            <h2>Sobre Nós</h2>
            <p>Conteúdo relacionado à seção "Sobre".</p>
        </section>

        <section>
            <h2>Nossos Serviços</h2>
            <p>Conteúdo relacionado à seção "Serviços".</p>
        </section>
    </main>

    <footer>
        <p>Rodapé (Repete em todas as páginas)</p>
    </footer>

</body>

</html>
